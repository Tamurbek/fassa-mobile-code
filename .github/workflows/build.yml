name: Build Mobile App (Windows & Android)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows & Android
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Download VC++ Redistributable
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "windows/vc_redist.x64.exe"

      - name: Create Installer (Inno Setup)
        shell: pwsh
        run: |
          iscc windows/installer.iss

      - name: Build Android (APK & AppBundle)
        run: |
          flutter build apk --release
          flutter build appbundle --release

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: fassa-pos-windows-installer
          path: build/windows/x64/runner/Release/installer/FassaPos_Setup.exe

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: fassa-pos-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Android AppBundle
        uses: actions/upload-artifact@v4
        with:
          name: fassa-pos-android-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
            build/windows/x64/runner/Release/installer/FassaPos_Setup.exe
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
